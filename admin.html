<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CladWise UAE — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b110d;--bg2:#111a13;--bg3:#182318;--accent:#00e5a0;--text:#e8f0ea;--muted:rgba(200,220,205,0.45);--border:rgba(0,229,160,0.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 50%,rgba(0,229,160,0.04) 0%,transparent 60%)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--accent);letter-spacing:2px;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:32px}
.login-box input{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:'DM Mono',monospace}
.login-box input:focus{border-color:rgba(0,229,160,0.4)}
.login-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:6px;padding:13px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.login-btn:hover{background:#00ffb3}
.login-err{color:#f87171;font-size:12px;margin-top:10px;display:none}
#admin-screen{display:none}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--accent);letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:12px}
.header-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;background:rgba(0,229,160,0.12);border:1px solid rgba(0,229,160,0.25);color:var(--accent);padding:4px 10px;border-radius:4px}
.icon-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:7px 14px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.2s}
.icon-btn:hover{border-color:rgba(0,229,160,0.4);color:var(--accent)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);padding:7px 14px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace}
.logout-btn:hover{border-color:#f87171;color:#f87171}
.main{max-width:1200px;margin:0 auto;padding:32px 24px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px 24px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;line-height:1}
.stat-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px}
.stat-card.s-pending .stat-val{color:#f59e0b}
.stat-card.s-approved .stat-val{color:var(--accent)}
.stat-card.s-rejected .stat-val{color:#f87171}
.filter-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content}
.filter-tab{padding:9px 20px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:none;border:none;color:var(--muted);border-right:1px solid var(--border)}
.filter-tab:last-child{border-right:none}
.filter-tab.active{background:rgba(0,229,160,0.1);color:var(--accent)}
.filter-tab:hover:not(.active){background:rgba(255,255,255,0.03);color:var(--text)}
.app-list{display:flex;flex-direction:column;gap:2px}
.app-row{background:var(--bg2);border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:16px 20px;display:grid;grid-template-columns:1fr 160px 100px 110px;align-items:center;gap:14px;cursor:pointer;transition:border-color 0.15s}
.app-row:hover{border-color:rgba(0,229,160,0.2)}
.app-row.expanded{border-color:rgba(0,229,160,0.35);border-bottom-left-radius:0;border-bottom-right-radius:0}
.app-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px}
.app-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.app-mats{display:flex;gap:4px;flex-wrap:wrap}
.app-mat{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:2px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:rgba(0,229,160,0.7);text-transform:uppercase}
.app-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.sbadge{display:inline-block;padding:4px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.s-pending{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);color:#f59e0b}
.s-approved{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:#00e5a0}
.s-rejected{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171}
.app-detail{background:var(--bg3);border:1px solid rgba(0,229,160,0.3);border-top:none;border-radius:0 0 6px 6px;padding:24px;display:none}
.app-detail.open{display:block}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.det-sec-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,160,0.4);margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.det-k{color:var(--muted)}
.det-v{color:var(--text);text-align:right;max-width:58%}
.action-area{border-top:1px solid rgba(255,255,255,0.06);padding-top:18px;margin-top:16px}
.note-inp{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:60px;margin-bottom:12px}
.note-inp:focus{border-color:rgba(0,229,160,0.4)}
.action-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-approve{background:var(--accent);color:#000;border:none;border-radius:6px;padding:10px 22px;font-weight:800;font-size:12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.btn-approve:hover{background:#00ffb3}
.btn-reject{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;border-radius:6px;padding:10px 22px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.btn-reject:hover{background:rgba(248,113,113,0.2)}
.btn-mail{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);border-radius:6px;padding:10px 16px;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace}
.btn-mail:hover{border-color:rgba(255,255,255,0.25);color:var(--text)}
.act-res{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-top:8px;display:none}
.empty{text-align:center;padding:60px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px}
.loading{text-align:center;padding:60px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px}
.page-tab{padding:12px 24px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s}
.page-tab:hover{color:var(--text)}
.page-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">CLADWISE</div>
    <div class="login-sub">ADMIN PANEL · UAE</div>
    <input type="password" id="admin-pass" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Enter Admin Panel</button>
    <div class="login-err" id="login-err">Incorrect password</div>
  </div>
</div>

<div id="admin-screen">
  <header>
    <div class="header-logo">CLADWISE UAE</div>
    <div class="header-right">
      <div class="header-badge">ADMIN</div>
      <button class="icon-btn" onclick="refreshCurrent()">↻ Refresh</button>
      <a href="index.html" class="icon-btn" style="text-decoration:none">← Site</a>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </header>
  <div class="main">

    <!-- Page tabs -->
    <div style="display:flex;gap:0;margin-bottom:32px;border-bottom:1px solid var(--border)">
      <button class="page-tab active" id="ptab-apps" onclick="switchPage('apps')">Supplier Applications</button>
      <button class="page-tab" id="ptab-regs" onclick="switchPage('regs')">Registered Accounts <span id="regs-pending-badge" style="display:none;margin-left:6px;background:rgba(245,158,11,0.2);color:#f59e0b;border:1px solid rgba(245,158,11,0.3);border-radius:10px;font-size:9px;padding:2px 7px;font-family:'DM Mono',monospace"></span></button>
    </div>

    <!-- APPLICATIONS PAGE -->
    <div id="page-apps">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase">Supplier Applications</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);margin-top:2px">REVIEW · APPROVE · REJECT</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Total</div></div>
        <div class="stat-card s-pending"><div class="stat-val" id="st-pending">—</div><div class="stat-lbl">Pending</div></div>
        <div class="stat-card s-approved"><div class="stat-val" id="st-approved">—</div><div class="stat-lbl">Approved</div></div>
        <div class="stat-card s-rejected"><div class="stat-val" id="st-rejected">—</div><div class="stat-lbl">Rejected</div></div>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
        <button class="filter-tab" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-tab" onclick="setFilter('approved',this)">Approved</button>
        <button class="filter-tab" onclick="setFilter('rejected',this)">Rejected</button>
      </div>
      <div id="app-list" class="app-list"><div class="loading">LOADING...</div></div>
    </div>

    <!-- REGISTERED ACCOUNTS PAGE -->
    <div id="page-regs" style="display:none">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase">Registered Accounts</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);margin-top:2px">SUPPLIER SIGNUPS · APPROVE · REJECT</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="rg-total">—</div><div class="stat-lbl">Total</div></div>
        <div class="stat-card s-pending"><div class="stat-val" id="rg-pending">—</div><div class="stat-lbl">Pending</div></div>
        <div class="stat-card s-approved"><div class="stat-val" id="rg-verified">—</div><div class="stat-lbl">Verified</div></div>
        <div class="stat-card s-rejected"><div class="stat-val" id="rg-rejected">—</div><div class="stat-lbl">Rejected</div></div>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setRegFilter('all',this)">All</button>
        <button class="filter-tab" onclick="setRegFilter('PENDING',this)">Pending</button>
        <button class="filter-tab" onclick="setRegFilter('VERIFIED',this)">Verified</button>
        <button class="filter-tab" onclick="setRegFilter('REJECTED',this)">Rejected</button>
      </div>
      <div id="reg-list" class="app-list"><div class="loading">LOADING...</div></div>
    </div>

  </div>
</div>

<script>
const API='https://backend-cladwise-production.up.railway.app'
const ADMIN_SECRET='cladwise2025admin'

// Retry fetch up to 3 times — handles Railway cold-start (first request may timeout)
let allApps=[], currentFilter='all'
let allRegs=[], currentRegFilter='all'
let currentPage='apps'

async function apiFetch(url, opts) {
  for (let i = 0; i < 3; i++) {
    try {
      const r = await fetch(url, opts);
      return r;
    } catch(e) {
      if (i < 2) await new Promise(res => setTimeout(res, 2000));
      else throw e;
    }
  }
}

function login(){
  const p=document.getElementById('admin-pass').value
  if(p!=='cladwise2025admin'){document.getElementById('login-err').style.display='block';return}
  document.getElementById('login-screen').style.display='none'
  document.getElementById('admin-screen').style.display='block'
  loadApps()
  loadRegs()
}
function logout(){
  document.getElementById('login-screen').style.display='flex'
  document.getElementById('admin-screen').style.display='none'
  document.getElementById('admin-pass').value=''
}
function refreshCurrent(){
  if(currentPage==='apps') loadApps()
  else loadRegs()
}
function switchPage(page){
  currentPage=page
  document.getElementById('page-apps').style.display=page==='apps'?'block':'none'
  document.getElementById('page-regs').style.display=page==='regs'?'block':'none'
  document.getElementById('ptab-apps').classList.toggle('active',page==='apps')
  document.getElementById('ptab-regs').classList.toggle('active',page==='regs')
}

// APPLICATIONS
async function loadApps(){
  document.getElementById('app-list').innerHTML='<div class="loading">LOADING...</div>'
  try{
    const r=await apiFetch(`${API}/api/admin/applications`,{headers:{'x-admin-secret':ADMIN_SECRET}})
    const data=await r.json()
    if(!r.ok) throw new Error(`Server ${r.status}: ${data.message||JSON.stringify(data)}`)
    allApps=data.applications||[]
    document.getElementById('st-total').textContent=allApps.length
    document.getElementById('st-pending').textContent=allApps.filter(a=>a.status==='pending').length
    document.getElementById('st-approved').textContent=allApps.filter(a=>a.status==='approved').length
    document.getElementById('st-rejected').textContent=allApps.filter(a=>a.status==='rejected').length
    renderApps()
  }catch(e){
    const msg = e?.message || String(e)
    document.getElementById('app-list').innerHTML=`<div class="empty" style="display:flex;flex-direction:column;gap:12px;align-items:center;padding:32px">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:#f87171">Error: ${msg}</div>
      <button onclick="loadApps()" style="background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--accent);border-radius:6px;padding:8px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px">↻ Retry</button>
    </div>`
    console.error('loadApps error:', e)
  }
}
function setFilter(f,el){
  currentFilter=f
  document.querySelectorAll('#page-apps .filter-tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  renderApps()
}
function renderApps(){
  const list=document.getElementById('app-list')
  const filtered=currentFilter==='all'?allApps:allApps.filter(a=>a.status===currentFilter)
  if(!filtered.length){list.innerHTML='<div class="empty">No applications</div>';return}
  list.innerHTML=filtered.map(a=>renderRow(a)).join('')
}
function renderRow(a){
  const d=a.data||{}
  const mats=(d.materials?.live||[]).map(m=>`<span class="app-mat">${m}</span>`).join('')||'<span class="app-mat" style="opacity:.3">—</span>'
  const date=new Date(a.created_at).toLocaleDateString('en-AE',{day:'2-digit',month:'short',year:'numeric'})
  const c=d.company||{}, ct=d.contact||{}, m=d.materials||{}
  const rev=a.reviewed_at?`Reviewed ${new Date(a.reviewed_at).toLocaleDateString('en-AE')}`:''
  const detHtml=`
  <div class="det-grid">
    <div>
      <div class="det-sec-title" style="margin-bottom:10px">Company</div>
      ${drow('Licence',c.licenseNum||'—')} ${drow('Emirate',c.licenseEmirate||'—')}
      ${drow('Established',c.established||'—')} ${drow('Turnover',c.turnover||'—')}
      ${drow('Employees',c.employees||'—')}
      ${drow('Website',c.website?`<a href="${c.website}" target="_blank" style="color:var(--accent)">${c.website}</a>`:'—')}
      <div style="height:16px"></div>
      <div class="det-sec-title">Materials & Coverage</div>
      ${drow('Live Materials',(m.live||[]).join(', ')||'—')}
      ${drow('Services',(m.services||[]).join(', ')||'—')}
      ${drow('Emirates',(m.emirates||[]).join(', ')||'—')}
      ${drow('Lead Time',m.leadTime||'—')} ${drow('Project Value',m.projectValue||'—')}
    </div>
    <div>
      <div class="det-sec-title" style="margin-bottom:10px">Contact Person</div>
      ${drow('Name',ct.name||'—')} ${drow('Title',ct.title||'—')}
      ${drow('Phone',ct.phone||'—')} ${drow('Email',ct.email||'—')}
      ${drow('Address',ct.address||'—')}
      <div style="height:16px"></div>
      <div class="det-sec-title">Public Listing</div>
      ${drow('Public Phone',ct.publicPhone||'—')} ${drow('Public Email',ct.publicEmail||'—')}
      ${c.tagline?`<div style="margin-top:12px;padding:10px;background:var(--bg2);border-radius:4px;font-size:11px;color:var(--muted);font-style:italic">"${c.tagline}"</div>`:''}
      ${a.review_note?`<div style="height:16px"></div><div class="det-sec-title">Review Note</div><div style="font-size:12px;color:var(--muted);padding:10px;background:var(--bg2);border-radius:4px;line-height:1.6">${a.review_note}</div>`:''}
    </div>
  </div>
  ${a.status==='pending'?`
  <div class="action-area">
    <div class="det-sec-title" style="margin-bottom:10px">Admin Action</div>
    <textarea class="note-inp" id="note-${a.id}" placeholder="Optional note for the approval/rejection email..."></textarea>
    <div class="action-btns">
      <button class="btn-approve" onclick="doAction(${a.id},'approve')">✓ Approve & Notify</button>
      <button class="btn-reject"  onclick="doAction(${a.id},'reject')">✕ Reject & Notify</button>
      <button class="btn-mail"    onclick="window.open('mailto:${a.contact_email}')">✉ Email Directly</button>
    </div>
    <div class="act-res" id="res-${a.id}"></div>
  </div>`:`
  <div style="margin-top:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span class="sbadge s-${a.status}">${a.status}</span>
    <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${rev}</span>
    <button class="btn-mail" style="margin-left:auto" onclick="window.open('mailto:${a.contact_email}')">✉ Email</button>
  </div>`}
  `
  return `<div>
    <div class="app-row" onclick="toggle('det-${a.id}',this)">
      <div><div class="app-name">${a.company_name}</div><div class="app-sub">${a.contact_email} · ${a.contact_name||'—'}</div></div>
      <div class="app-mats">${mats}</div>
      <div class="app-date">${date}</div>
      <span class="sbadge s-${a.status}">${a.status}</span>
    </div>
    <div class="app-detail" id="det-${a.id}">${detHtml}</div>
  </div>`
}
async function doAction(id,action){
  const note=document.getElementById(`note-${id}`)?.value||''
  const res=document.getElementById(`res-${id}`)
  res.style.display='block';res.style.color='var(--accent)';res.textContent='Sending...'
  try{
    const r=await fetch(`${API}/api/admin/applications/${id}/${action}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','x-admin-secret':ADMIN_SECRET},
      body:JSON.stringify({note})
    })
    const data=await r.json()
    if(r.ok){res.textContent=`✓ ${action==='approve'?'Approved':'Rejected'} — email sent`;setTimeout(()=>loadApps(),1500)}
    else{res.textContent='✕ '+data.message;res.style.color='#f87171'}
  }catch(e){res.textContent='✕ Network error';res.style.color='#f87171'}
}

// REGISTERED ACCOUNTS
async function loadRegs(){
  document.getElementById('reg-list').innerHTML='<div class="loading">LOADING...</div>'
  try{
    const r=await apiFetch(`${API}/api/admin/registrations`,{headers:{'x-admin-secret':ADMIN_SECRET}})
    const data=await r.json()
    if(!r.ok) throw new Error(`Server ${r.status}: ${data.message||JSON.stringify(data)}`)
    allRegs=data.registrations||[]
    const pending=allRegs.filter(x=>x.verification_status==='PENDING').length
    document.getElementById('rg-total').textContent=allRegs.length
    document.getElementById('rg-pending').textContent=pending
    document.getElementById('rg-verified').textContent=allRegs.filter(x=>x.verification_status==='VERIFIED').length
    document.getElementById('rg-rejected').textContent=allRegs.filter(x=>x.verification_status==='REJECTED').length
    const badge=document.getElementById('regs-pending-badge')
    if(pending>0){badge.style.display='inline';badge.textContent=pending+' pending'}
    else badge.style.display='none'
    renderRegs()
  }catch(e){
    document.getElementById('reg-list').innerHTML=`<div class="empty" style="display:flex;flex-direction:column;gap:12px;align-items:center;padding:32px"><div style="font-family:'DM Mono',monospace;font-size:11px;color:#f87171">Error: ${e?.message||String(e)}</div><button onclick="loadRegs()" style="background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--accent);border-radius:6px;padding:8px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px">↻ Retry</button></div>`
    console.error('loadRegs error:', e)
  }
}
function setRegFilter(f,el){
  currentRegFilter=f
  document.querySelectorAll('#page-regs .filter-tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  renderRegs()
}
function renderRegs(){
  const list=document.getElementById('reg-list')
  const filtered=currentRegFilter==='all'?allRegs:allRegs.filter(x=>x.verification_status===currentRegFilter)
  if(!filtered.length){list.innerHTML='<div class="empty">No accounts</div>';return}
  list.innerHTML=filtered.map(x=>renderRegRow(x)).join('')
}
function renderRegRow(r){
  const date=new Date(r.registered_at).toLocaleDateString('en-AE',{day:'2-digit',month:'short',year:'numeric'})
  const st=r.verification_status
  const stClass=st==='VERIFIED'?'s-approved':st==='REJECTED'?'s-rejected':'s-pending'
  const detHtml=`
  <div class="det-grid">
    <div>
      <div class="det-sec-title" style="margin-bottom:10px">Account Details</div>
      ${drow('Email',r.email)}
      ${drow('Category',r.category||'—')}
      ${drow('Tax ID',r.tax_id||'—')}
      ${drow('Trade Licence',r.trade_licence_number||'—')}
      ${drow('Emirate',r.trade_licence_emirate||'—')}
      ${drow('Registered',date)}
    </div>
    <div>
      ${r.verification_note?`<div class="det-sec-title">Review Note</div><div style="font-size:12px;color:var(--muted);padding:10px;background:var(--bg2);border-radius:4px;line-height:1.6;margin-bottom:16px">${r.verification_note}</div>`:''}
      ${r.verified_at?drow('Approved On',new Date(r.verified_at).toLocaleDateString('en-AE')):''}
    </div>
  </div>
  ${st==='PENDING'?`
  <div class="action-area">
    <div class="det-sec-title" style="margin-bottom:10px">Admin Action</div>
    <textarea class="note-inp" id="rnote-${r.id}" placeholder="Optional note for the email to supplier..."></textarea>
    <div class="action-btns">
      <button class="btn-approve" onclick="doRegAction('${r.id}','VERIFIED')">✓ Approve & Notify</button>
      <button class="btn-reject"  onclick="doRegAction('${r.id}','REJECTED')">✕ Reject & Notify</button>
      <button class="btn-mail"    onclick="window.open('mailto:${r.email}')">✉ Email Directly</button>
    </div>
    <div class="act-res" id="rres-${r.id}"></div>
  </div>`:`
  <div style="margin-top:16px;display:flex;align-items:center;gap:12px">
    <span class="sbadge ${stClass}">${st}</span>
    <button class="btn-mail" style="margin-left:auto" onclick="window.open('mailto:${r.email}')">✉ Email</button>
  </div>`}
  `
  return `<div>
    <div class="app-row" onclick="toggle('rdet-${r.id}',this)">
      <div><div class="app-name">${r.shop_name}</div><div class="app-sub">${r.email} · ${r.category||'—'}</div></div>
      <div class="app-mats"><span class="app-mat">${r.trade_licence_emirate||'UAE'}</span></div>
      <div class="app-date">${date}</div>
      <span class="sbadge ${stClass}">${st}</span>
    </div>
    <div class="app-detail" id="rdet-${r.id}">${detHtml}</div>
  </div>`
}
async function doRegAction(id,status){
  const note=document.getElementById(`rnote-${id}`)?.value||''
  const res=document.getElementById(`rres-${id}`)
  res.style.display='block';res.style.color='var(--accent)';res.textContent='Sending...'
  try{
    const r=await fetch(`${API}/api/admin/registrations/${id}/verify`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','x-admin-secret':ADMIN_SECRET},
      body:JSON.stringify({status,note})
    })
    const data=await r.json()
    if(r.ok){res.textContent=`✓ ${status==='VERIFIED'?'Approved':'Rejected'} — email sent`;setTimeout(()=>loadRegs(),1500)}
    else{res.textContent='✕ '+data.message;res.style.color='#f87171'}
  }catch(e){res.textContent='✕ Network error';res.style.color='#f87171'}
}

// SHARED
function drow(k,v){return `<div class="det-row"><span class="det-k">${k}</span><span class="det-v">${v}</span></div>`}
function toggle(id,row){
  const det=document.getElementById(id)
  const isOpen=det.classList.contains('open')
  document.querySelectorAll('.app-detail').forEach(d=>d.classList.remove('open'))
  document.querySelectorAll('.app-row').forEach(r=>r.classList.remove('expanded'))
  if(!isOpen){det.classList.add('open');row.classList.add('expanded')}
}
</script>
</body>
</html>
