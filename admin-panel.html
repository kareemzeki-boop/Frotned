<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - CladWise UAE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --accent: #00e5a0;
  --accent2: #00b37a;
  --text: #f0f0f0;
  --muted: #777;
  --error: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; }

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px;
  position: fixed;
  left: 0;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  width: 280px;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  text-decoration: none;
  color: var(--text);
}
.sidebar-logo-icon {
  width: 40px;
  height: 40px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #000;
}
.sidebar-logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1px;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  text-decoration: none;
  color: var(--muted);
  transition: all 0.2s;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
}
.sidebar-nav-item:hover {
  color: var(--text);
  background: rgba(0, 229, 160, 0.1);
}
.sidebar-nav-item.active {
  background: rgba(0, 229, 160, 0.15);
  color: var(--accent);
  border-left: 3px solid var(--accent);
  padding-left: 13px;
}
.sidebar-nav-item i {
  width: 20px;
  text-align: center;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.logout-btn {
  width: 100%;
  padding: 12px;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.logout-btn:hover {
  background: rgba(239, 68, 68, 0.2);
}

/* MAIN CONTENT */
.main {
  margin-left: 280px;
  padding: 32px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
}

/* FILTERS */
.filters {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-group {
  display: flex;
  gap: 8px;
}
.filter-btn {
  padding: 10px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
}
.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.filter-btn.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* TABLE */
.table-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}

th {
  padding: 16px;
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.5px;
  color: var(--muted);
  text-transform: uppercase;
}

td {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

tbody tr:hover {
  background: rgba(0, 229, 160, 0.05);
}

tbody tr:last-child td {
  border-bottom: none;
}

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}

.badge-pending {
  background: rgba(245, 158, 11, 0.1);
  color: #fcd34d;
}
.badge-verified {
  background: rgba(16, 185, 129, 0.1);
  color: #86efac;
}
.badge-rejected {
  background: rgba(239, 68, 68, 0.1);
  color: #fca5a5;
}
.badge-expired {
  background: rgba(107, 114, 128, 0.1);
  color: #d1d5db;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 8px;
}
.action-btn {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: rgba(0, 229, 160, 0.1);
  color: var(--accent);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
}
.action-btn:hover {
  background: rgba(0, 229, 160, 0.2);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal.open {
  display: flex;
}

.modal-content {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  max-width: 800px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
}
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-close:hover {
  color: var(--text);
}

.modal-section {
  margin-bottom: 24px;
}
.modal-section-title {
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
}

.modal-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.info-item {
  background: var(--bg3);
  padding: 12px;
  border-radius: 8px;
}
.info-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.info-value {
  font-weight: 600;
}

.documents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin: 12px 0;
}
.document-thumb {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.document-thumb:hover {
  border-color: var(--accent);
  background: rgba(0, 229, 160, 0.05);
}
.document-thumb i {
  font-size: 32px;
  color: var(--accent);
  margin-bottom: 8px;
}
.document-thumb-name {
  font-size: 11px;
  color: var(--muted);
  word-break: break-word;
}

/* FORM */
.form-group {
  margin-bottom: 16px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 13px;
}
textarea {
  width: 100%;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  resize: vertical;
}
textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-btn-verify {
  background: var(--success);
  color: #000;
}
.modal-btn-verify:hover {
  background: #34d399;
}
.modal-btn-reject {
  background: var(--error);
  color: #fff;
}
.modal-btn-reject:hover {
  background: #dc2626;
}
.modal-btn-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.modal-btn-cancel:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 32px;
  color: var(--muted);
}
.empty-state i {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .layout {
    grid-template-columns: 1fr;
  }
  .sidebar {
    position: relative;
    width: 100%;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-nav {
    flex-direction: row;
    gap: 4px;
  }
  .sidebar-nav-item {
    padding: 8px 12px;
  }
  .main {
    margin-left: 0;
  }
  .modal-info {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">
      <div class="sidebar-logo-icon">🏗️</div>
      <div class="sidebar-logo-text">CLADWISE</div>
    </a>

    <nav class="sidebar-nav">
      <button class="sidebar-nav-item active" data-tab="pending">
        <i class="fas fa-hourglass-half"></i> Pending (0)
      </button>
      <button class="sidebar-nav-item" data-tab="verified">
        <i class="fas fa-check-circle"></i> Verified
      </button>
      <button class="sidebar-nav-item" data-tab="rejected">
        <i class="fas fa-times-circle"></i> Rejected
      </button>
      <button class="sidebar-nav-item" data-tab="expired">
        <i class="fas fa-exclamation-circle"></i> Expired
      </button>
    </nav>

    <div class="sidebar-divider"></div>

    <nav class="sidebar-nav">
      <button class="sidebar-nav-item" data-tab="users">
        <i class="fas fa-users"></i> All Users
      </button>
      <button class="sidebar-nav-item" data-tab="audit">
        <i class="fas fa-history"></i> Audit Log
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="header">
      <h1 class="page-title">Admin Panel</h1>
      <div id="stats" style="display: flex; gap: 24px; font-size: 14px;">
        <div>
          <div style="color: var(--muted); margin-bottom: 4px;">Pending</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--warning);" id="statPending">0</div>
        </div>
        <div>
          <div style="color: var(--muted); margin-bottom: 4px;">Verified</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--success);" id="statVerified">0</div>
        </div>
        <div>
          <div style="color: var(--muted); margin-bottom: 4px;">Expired</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--muted);" id="statExpired">0</div>
        </div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters" id="filters"></div>

    <!-- TABLE -->
    <div class="table-container" id="tableContainer">
      <table id="suppliersTable">
        <thead>
          <tr>
            <th>Company</th>
            <th>Category</th>
            <th>Emirate</th>
            <th>License Expiry</th>
            <th>Status</th>
            <th>Applied</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" style="text-align: center; padding: 40px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal" id="detailsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Supplier Details</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div id="modalBody"></div>

    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script type="module">
import { API, Auth, requireAuth } from './api.js'

let currentTab = 'pending'
let suppliers = []
let currentSupplier = null

// ─── AUTH CHECK ────────────────────────────────────────────────────────────
await requireAuth('/')

// ─── LOAD SUPPLIERS ────────────────────────────────────────────────────────
async function loadSuppliers() {
  try {
    const response = await fetch(`/api/admin/suppliers?status=${currentTab.toUpperCase()}`, {
      headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
    })
    const data = await response.json()
    suppliers = data.suppliers || []
    renderTable()
    updateStats()
  } catch (err) {
    console.error('Failed to load suppliers:', err)
  }
}

function updateStats() {
  fetch('/api/admin/suppliers', {
    headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
  })
    .then(r => r.json())
    .then(data => {
      const pending = data.suppliers.filter(s => s.verificationStatus === 'PENDING').length
      const verified = data.suppliers.filter(s => s.verificationStatus === 'VERIFIED').length
      const expired = data.suppliers.filter(s => s.verificationStatus === 'EXPIRED').length
      document.getElementById('statPending').textContent = pending
      document.getElementById('statVerified').textContent = verified
      document.getElementById('statExpired').textContent = expired
      document.querySelector('[data-tab="pending"]').textContent = `Pending (${pending})`
    })
}

function renderTable() {
  const tbody = document.getElementById('tableBody')
  
  if (suppliers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;"><div class="empty-state"><i class="fas fa-inbox"></i><p>No suppliers found</p></div></td></tr>'
    return
  }

  tbody.innerHTML = suppliers.map(supplier => `
    <tr>
      <td>
        <strong>${supplier.shopName}</strong><br>
        <span style="color: var(--muted); font-size: 12px;">${supplier.user.email}</span>
      </td>
      <td>${supplier.category}</td>
      <td>${supplier.tradeLicenceEmirate || '—'}</td>
      <td>
        ${supplier.tradeLicenceExpiry ? new Date(supplier.tradeLicenceExpiry).toLocaleDateString('en-AE') : '—'}
      </td>
      <td>
        <span class="badge badge-${supplier.verificationStatus.toLowerCase()}">
          <i class="fas fa-${getStatusIcon(supplier.verificationStatus)}"></i>
          ${supplier.verificationStatus}
        </span>
      </td>
      <td style="font-size: 12px; color: var(--muted);">
        ${new Date(supplier.createdAt).toLocaleDateString('en-AE')}
      </td>
      <td>
        <div class="actions">
          <button class="action-btn" onclick="viewDetails('${supplier.id}')">
            <i class="fas fa-eye"></i> Review
          </button>
        </div>
      </td>
    </tr>
  `).join('')
}

function getStatusIcon(status) {
  const icons = {
    PENDING: 'hourglass-half',
    VERIFIED: 'check-circle',
    REJECTED: 'times-circle',
    EXPIRED: 'exclamation-circle'
  }
  return icons[status] || 'circle'
}

async function viewDetails(supplierId) {
  try {
    const response = await fetch(`/api/admin/suppliers/${supplierId}`, {
      headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
    })
    const data = await response.json()
    currentSupplier = data.supplier
    renderModal()
    document.getElementById('detailsModal').classList.add('open')
  } catch (err) {
    console.error('Failed to load supplier details:', err)
  }
}

function renderModal() {
  const supplier = currentSupplier
  const modalBody = document.getElementById('modalBody')
  const modalActions = document.getElementById('modalActions')

  modalBody.innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Company Information</div>
      <div class="modal-info">
        <div class="info-item">
          <div class="info-label">Shop Name</div>
          <div class="info-value">${supplier.shopName}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Category</div>
          <div class="info-value">${supplier.category}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Tax ID</div>
          <div class="info-value">${supplier.taxId}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Emirate</div>
          <div class="info-value">${supplier.tradeLicenceEmirate || '—'}</div>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Trade License</div>
      <div class="modal-info">
        <div class="info-item">
          <div class="info-label">License Number</div>
          <div class="info-value">${supplier.tradeLicenceNumber || '—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Issue Date</div>
          <div class="info-value">${supplier.tradeLicenceIssueDate ? new Date(supplier.tradeLicenceIssueDate).toLocaleDateString('en-AE') : '—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Expiry Date</div>
          <div class="info-value">${supplier.tradeLicenceExpiry ? new Date(supplier.tradeLicenceExpiry).toLocaleDateString('en-AE') : '—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Status</div>
          <div class="info-value">
            <span class="badge badge-${supplier.verificationStatus.toLowerCase()}">
              ${supplier.verificationStatus}
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Contact Information</div>
      <div class="modal-info">
        <div class="info-item">
          <div class="info-label">Email</div>
          <div class="info-value">${supplier.user.email}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Phone</div>
          <div class="info-value">${supplier.phoneNumber || '—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Contact Person</div>
          <div class="info-value">${supplier.contactPerson || '—'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Address</div>
          <div class="info-value">${supplier.address || '—'}</div>
        </div>
      </div>
    </div>

    ${supplier.documents.length > 0 ? `
      <div class="modal-section">
        <div class="modal-section-title">Uploaded Documents</div>
        <div class="documents-grid">
          ${supplier.documents.map(doc => `
            <div class="document-thumb">
              <i class="fas fa-file-pdf"></i>
              <div class="document-thumb-name">${doc.documentName}</div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}

    ${supplier.verificationStatus === 'PENDING' ? `
      <div class="modal-section">
        <label>Verification Note</label>
        <textarea id="verificationNote" placeholder="Add notes about this supplier..." rows="4"></textarea>
      </div>
    ` : ''}
  `

  // Render actions based on status
  if (supplier.verificationStatus === 'PENDING') {
    modalActions.innerHTML = `
      <button class="modal-btn modal-btn-verify" onclick="verifySupplier('VERIFIED')">
        <i class="fas fa-check"></i> Approve
      </button>
      <button class="modal-btn modal-btn-reject" onclick="verifySupplier('REJECTED')">
        <i class="fas fa-times"></i> Reject
      </button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
    `
  } else if (supplier.verificationStatus === 'VERIFIED') {
    modalActions.innerHTML = `
      <button class="modal-btn modal-btn-verify" onclick="renewSupplier()">
        <i class="fas fa-sync"></i> Renew License
      </button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Close</button>
    `
  } else {
    modalActions.innerHTML = `
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Close</button>
    `
  }
}

async function verifySupplier(status) {
  const note = document.getElementById('verificationNote')?.value || ''
  try {
    await fetch(`/api/admin/suppliers/${currentSupplier.id}/verify`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${Auth.getToken()}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ status, note })
    })
    closeModal()
    loadSuppliers()
  } catch (err) {
    console.error('Failed to verify supplier:', err)
  }
}

async function renewSupplier() {
  const newExpiryDate = prompt('Enter new expiry date (YYYY-MM-DD):', new Date().toISOString().split('T')[0])
  if (!newExpiryDate) return
  
  try {
    await fetch(`/api/admin/suppliers/${currentSupplier.id}/renew`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${Auth.getToken()}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ newExpiryDate })
    })
    closeModal()
    loadSuppliers()
  } catch (err) {
    console.error('Failed to renew supplier:', err)
  }
}

function closeModal() {
  document.getElementById('detailsModal').classList.remove('open')
}

// ─── TAB SWITCHING ─────────────────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    currentTab = btn.dataset.tab
    loadSuppliers()
  })
})

function logout() {
  Auth.logout()
}

// ─── INITIAL LOAD ──────────────────────────────────────────────────────────
loadSuppliers()
setInterval(updateStats, 30000) // Update stats every 30 seconds
</script>

</body>
</html>
